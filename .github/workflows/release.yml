name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release"
        required: true
        default: "v1.0.0"
      dry_run:
        description: "Run in dry-run mode (no publishing)"
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: fraware/lean-yo

jobs:
  validate-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Lean version
        id: lean
        run: echo "version=$(cut -d: -f2 lean-toolchain)" >> "$GITHUB_OUTPUT"

      - uses: leanprover/lean4-action@v2
        with:
          lean-version: ${{ steps.lean.outputs.version }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate (build + tests + scripts)
        run: |
          bash scripts/ci_build.sh
          lake exe leanyo-benchmarks
          python3 scripts/production_test.py
          python3 scripts/validate_lemmas.py

  build-artifacts:
    runs-on: ubuntu-latest
    needs: validate-release
    outputs:
      version: ${{ steps.version.outputs.version }}
      lean-version: ${{ steps.version.outputs.lean-version }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version information
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          LEAN_VERSION=$(cut -d: -f2 lean-toolchain)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "lean-version=${LEAN_VERSION}" >> "$GITHUB_OUTPUT"

      - uses: leanprover/lean4-action@v2
        with:
          lean-version: ${{ steps.version.outputs.lean-version }}

      - name: Build library
        run: bash scripts/ci_build.sh

      - name: Create release artifacts
        run: |
          mkdir -p dist
          tar -czf "dist/lean-yo-${{ steps.version.outputs.version }}.tar.gz" \
            --exclude='.git' \
            --exclude='.lake' \
            --exclude='dist' \
            --exclude='*.tar.gz' \
            .
          (cd dist && sha256sum ./*.tar.gz > checksums.txt)
          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/

  docker-release:
    runs-on: ubuntu-latest
    needs: [validate-release, build-artifacts]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run == false
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.build-artifacts.outputs.version }}
            type=raw,value=latest
            type=raw,value=${{ needs.build-artifacts.outputs.lean-version }}

      - name: Build and push image
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run == false
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build image (dry run, load locally)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == true
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: lean-yo:dry-run
          cache-from: type=gha

      - name: Test Docker image (dry run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == true
        run: |
          docker run --rm lean-yo:dry-run --help
          docker run --rm lean-yo:dry-run --version

      - name: Test Docker image (published)
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run == false
        run: |
          docker run --rm "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" --help
          docker run --rm "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" --version

  create-release:
    runs-on: ubuntu-latest
    needs: [build-artifacts, docker-release]
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run == false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist/

      - name: Generate release notes
        run: |
          VERSION="${{ needs.build-artifacts.outputs.version }}"
          LEAN_VERSION="${{ needs.build-artifacts.outputs.lean-version }}"
          {
            echo "# LeanYo ${VERSION}"
            echo ""
            echo "Lean 4 tactic library for category-theoretic proofs using (co)Yoneda-style rewrites."
            echo ""
            echo "## Quick start"
            echo ""
            echo "**Docker:**"
            echo '```bash'
            echo "docker run --rm ghcr.io/fraware/lean-yo:${VERSION} --help"
            echo '```'
            echo ""
            echo "**Lake dependency:**"
            echo '```lean'
            echo "require lean-yo from git \"https://github.com/fraware/lean-yo.git\" @ \"${VERSION}\""
            echo '```'
            echo ""
            echo "## Requirements"
            echo ""
            echo "- **Lean:** ${LEAN_VERSION} (see \`lean-toolchain\` in this tag)"
            echo "- **Mathlib:** pin in \`lakefile.lean\` / \`lake-manifest.json\` for this release"
            echo ""
            echo "## Docs"
            echo ""
            echo "- [Usage](https://github.com/fraware/lean-yo/blob/${VERSION}/docs/USAGE_GUIDE.md)"
            echo "- [API (hand-written)](https://github.com/fraware/lean-yo/blob/${VERSION}/docs/API_REFERENCE.md)"
            echo ""
            echo "## Checksums"
            echo ""
            echo '```'
            cat dist/checksums.txt
            echo '```'
          } > release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-artifacts.outputs.version }}
          name: LeanYo ${{ needs.build-artifacts.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            dist/lean-yo-${{ needs.build-artifacts.outputs.version }}.tar.gz
            dist/checksums.txt
