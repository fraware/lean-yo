name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Lean version from lean-toolchain
        id: lean
        run: |
          echo "version=$(cut -d: -f2 lean-toolchain)" >> "$GITHUB_OUTPUT"

      - name: Cache Lake build
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lake-manifest.json', 'lean-toolchain', 'lakefile.lean') }}
          restore-keys: |
            lake-${{ runner.os }}-

      - name: Setup Lean
        uses: leanprover/lean4-action@v2
        with:
          lean-version: ${{ steps.lean.outputs.version }}

      - name: Build library and tests
        run: bash scripts/ci_build.sh

      - name: Run benchmark executable (smoke)
        run: lake exe leanyo-benchmarks

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Production and lemma scripts
        run: |
          python3 scripts/production_test.py
          python3 scripts/validate_lemmas.py

  docker:
    runs-on: ubuntu-latest
    needs: [verify]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Read Lean version for image tags
        id: lv
        run: echo "lean=$(cut -d: -f2 lean-toolchain)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (push)
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/fraware/lean-yo
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.lv.outputs.lean }},enable={{is_default_branch}}

      - name: Build and push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build (load for PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: lean-yo:ci
          cache-from: type=gha

      - name: Test Docker image (PR)
        if: github.event_name == 'pull_request'
        run: |
          docker run --rm lean-yo:ci --help
          docker run --rm lean-yo:ci --version

      - name: Test Docker image (registry)
        if: github.event_name != 'pull_request'
        run: |
          docker run --rm ghcr.io/fraware/lean-yo:latest --help
          docker run --rm ghcr.io/fraware/lean-yo:latest --version
